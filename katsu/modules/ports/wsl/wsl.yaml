builder: dnf

scripts:
  post:
    - id: dnf-changes
      name: Set DNF defaults
      file: dnf-changes.sh

dnf:
  repodir: ../base/repodir/
  releasever: 42
  exec: dnf4
  options:
    - --setopt=cachedir=/var/cache/dnf
    - --setopt=keepcache=True
    - --setopt=tsflags=
    - --setopt=max_parallel_downloads=20
    - --setopt=install_weak_deps=True
  exclude:
    - fedora-release*
    - generic-release*
    - kernel*
    - linux-firmware
  packages:
    - "@core"
    - "@ultramarine-product-common"
    - filesystem
    - setup
    - glibc
    - glibc-common
    - dnf
    - git
    - vim
    - rpm
    - libgomp
    - ultramarine-release-identity-basic
    - fedora-repos
    - ultramarine-langpacks-en
    - mesa-libGLU
    - mesa-libxatracker
    - mesa-vulkan-drivers
    - mesa-filesystem
    - mesa-libgbm
    - mesa-dri-drivers
    - mesa-libGL
    - mesa-libEGL
    - mesa-dxil-libs
    - mesa-vulkan-drivers
