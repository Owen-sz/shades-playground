builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../plasma/plasma.yaml
  - surface.yaml

distro: Ultramarine Linux 42 (Plasma Edition)

out_file: ultramarine-plasma-42-surface.iso

scripts:
  post:
    - id: plasma-live
      name: Set up Plasma Live
      file: ../../plasma/./plasma-live.sh

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Kd-Live

dnf:
  releasever: 42
  exec: dnf4
