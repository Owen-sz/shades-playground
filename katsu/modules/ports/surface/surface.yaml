builder: dnf

dnf:
  releasever: 42
  exec: dnf4
  packages:
    - kernel-surface
    - kernel-surface-core
    - kernel-surface-devel
    - kernel-surface-modules
    - kernel-surface-modules-core
    - kernel-surface-modules-extra
    - iptsd
    - libwacom-surface
    - ultramarine-release-surface
    - terra-surface-dtx-daemon
    # Below for camera support
    - intel-vsc-firmware
    - libcamera
    - libcamera-tools
    - libcamera-qcam
    - libcamera-gstreamer
    - libcamera-ipa
    - pipewire-plugin-libcamera

  exclude:
    - libwacom
    - kernel
    - kernel-core
    - kernel-devel*
