builder: dnf

import:
  - ../../base/base.yaml
  - ../../live/anaconda.yaml
  - ../../live/live.yaml
  - ../../xfce/xfce.yaml
  - surface.yaml

distro: Ultramarine Linux 42 (Xfce Edition)

out_file: ultramarine-xfce-42-surface.iso

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-Xfce-Live

scripts:
  post:
    - id: xfce-live
      name: Set up XFCE Live
      file: ../../xfce/./xfce-live.sh

dnf:
  releasever: 42
  exec: dnf4
