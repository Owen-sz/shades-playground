dnf:
  releasever: 42
  exec: dnf5
  packages:
    - "@sway-desktop-environment"
    - "@ultramarine-product-common"
    - "@ultramarine-desktop-product-common"
    - sddm
    - kitty
    - rofi-wayland # this might be pre-installed already with gnome or cinnamon pkgs
    - topgrade # do menu bar upgrade thing?
    - ultramarine-backgrounds-compat
    - ultramarine-shell-config
    - wl-clipboard
    - fontawesome-6-free-fonts
    - fontawesome-6-brand-fonts
    - rms-inter-fonts
    # - ultramarine-release-sway
    # - ultramarine-release-identity-sway
  exclude:
    - ibus
    - ibus-mozc
    - ibus-anthy
    - ibus-qt
    - ibus-m17n
    - ibus-hangul
    - ibus-libpinyin
    - ibus-typing-booster
    - anthy
    - ptyxis
    - wmenu
    # exclude random stuff @sway-desktop-environment pulls in
    - virtualbox-guest-additions
    - gnome-disk-utility # mightve also been causing gnome to get pulled in
    - foot
