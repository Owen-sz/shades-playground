dnf:
  releasever: 42
  exec: dnf5
  packages:
    - "@sway-desktop-environment"
    - sddm
    - gparted
    - kitty
    # - ultramarine-release-sway
    # - ultramarine-release-identity-sway
  exclude:
    - ibus
    - ibus-mozc
    - ibus-anthy
    - ibus-qt
    - ibus-m17n
    - ibus-hangul
    - ibus-libpinyin
    - ibus-typing-booster
    - anthy
    - ptyxis
    # gnome is pulled in lol?
    - gnome-shell
    - gnome-core
    - gnome-session
    - gnome-control-center
    - gdm
    # exclude random stuff @sway-desktop-environment pulls in
    - virtualbox-guest-additions
    - gnome-disk-utility
    - foot
