builder: dnf

import:
  - ../../base/base.yaml
  - ../../base/desktop.yaml
  - ../../live/live.yaml
  - ../../live/anaconda.yaml
  - sway.yaml

distro: Ultramarine Linux 42 (Sway Shade)

out_file: ultramarine-shade-sway-42-live-anaconda.iso

scripts:
  post:
    - id: sway-live
      name: Set up Sway Live
      file: ./sway-live.sh
    - id: sway-live-anaconda
      name: Set up Anaconda
      file: ./sway-live-anaconda.sh
    - id: sway-sddm
      name: Set up Sway SDDM
      file: ./sway-sddm.sh
    - id: sway setup
      name: Set up sway files
      file: ./sway-setup.sh

bootloader: grub

kernel_cmdline: "quiet rhgb"

iso:
  volume_id: UM-sway-Live-Anaconda

dnf:
  releasever: 42
  exec: dnf5
