dnf:
  releasever: 42
  exec: dnf4
  exclude:
    # use ultramarine-langpacks
    - langpacks-*
    - default-fonts-*
    # remove broken imsettings
    - im-chooser
    # Experiementally remove the following packages
    # I have no idea why they are pulled in
    - qemu*
  packages:
    # for testing purposes only, revert back to readymade before merge
    - readymade-nightly
    - readymade-nightly-config-ultramarine
    # -readymade
    - taidan
    - ultramarine-langpacks-core-en
    - ultramarine-langpacks-fonts-en
